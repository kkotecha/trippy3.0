<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trippy - Your AI Travel Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold text-gray-800 mb-3 flex items-center justify-center gap-3">
                <span class="text-6xl">✈️</span>
                <span>Trippy</span>
            </h1>
            <p class="text-lg text-gray-600">Your AI-powered travel assistant for effortless trip planning</p>
        </header>

        <!-- Form -->
        <div id="formContainer" class="bg-white rounded-lg shadow-md p-8 mb-8">
            <form id="tripForm" class="space-y-6">
                <!-- Nationality -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Your Nationality/Home Country *
                    </label>
                    <input
                        type="text"
                        name="nationality"
                        value="India"
                        placeholder="e.g., India, United States, United Kingdom"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>

                <!-- Country -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Destination Country *
                    </label>
                    <input
                        type="text"
                        name="country"
                        placeholder="e.g., Japan, Italy, France, Thailand"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    >
                </div>

                <!-- Duration -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Total Trip Duration (days) *
                    </label>
                    <input
                        type="number"
                        name="total_duration"
                        min="3"
                        max="30"
                        value="10"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <!-- Interests -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Interests (comma-separated) *
                    </label>
                    <input
                        type="text"
                        name="interests"
                        placeholder="e.g., temples, food, beaches, nightlife, museums"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <!-- Budget -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Budget Level *
                    </label>
                    <select
                        name="budget_tier"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="budget">Budget (Hostels, street food)</option>
                        <option value="moderate" selected>Moderate (3-star hotels, mix dining)</option>
                        <option value="luxury">Luxury (5-star, fine dining)</option>
                    </select>
                </div>

                <!-- Number of Cities -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Number of Cities (optional)
                    </label>
                    <select
                        name="num_cities"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="">Let AI decide</option>
                        <option value="2">2 cities</option>
                        <option value="3">3 cities</option>
                        <option value="4">4 cities</option>
                        <option value="5">5 cities</option>
                        <option value="6">6 cities</option>
                    </select>
                </div>

                <!-- Starting City -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Preferred Starting City (optional)
                    </label>
                    <input
                        type="text"
                        name="starting_city"
                        placeholder="e.g., Tokyo (leave blank for AI suggestion)"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <!-- Travel Pace -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Travel Pace
                    </label>
                    <select
                        name="travel_pace"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="relaxed">Relaxed (More time per city)</option>
                        <option value="moderate" selected>Moderate (Balanced)</option>
                        <option value="fast">Fast-paced (See more cities)</option>
                    </select>
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full bg-blue-600 text-white py-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-200 text-lg"
                >
                    Plan My Journey 🚀
                </button>
            </form>
        </div>

        <!-- Loading State -->
        <div id="loadingContainer" class="hidden bg-white rounded-lg shadow-md p-12 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mx-auto mb-4"></div>
            <p class="text-xl text-gray-700 font-medium">Planning your perfect journey...</p>
            <p class="text-sm text-gray-500 mt-2">This may take 60-90 seconds</p>
        </div>

        <!-- Results -->
        <div id="resultsContainer" class="hidden">
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <!-- Tabs -->
                <div id="tabs" class="flex overflow-x-auto border-b border-gray-200 bg-gray-50">
                    <!-- Dynamic tabs will be inserted here -->
                </div>

                <!-- Tab Content -->
                <div id="tabContent" class="p-8">
                    <!-- Dynamic content will be inserted here -->
                </div>
            </div>

            <!-- Start Over Button -->
            <button
                onclick="location.reload()"
                class="mt-6 w-full bg-gray-600 text-white py-3 rounded-lg font-semibold hover:bg-gray-700 transition"
            >
                Plan Another Trip
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
